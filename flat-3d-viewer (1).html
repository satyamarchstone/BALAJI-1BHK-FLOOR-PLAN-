<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1 BHK 3D Floor Plan – Interactive Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f1117; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
  #canvas-container { width: 100vw; height: 100vh; }
  #ui {
    position: fixed; top: 20px; left: 20px; z-index: 10;
    background: rgba(15,17,23,0.85);
    border: 1px solid rgba(255,200,80,0.25);
    border-radius: 12px; padding: 16px 20px; color: #fff;
    backdrop-filter: blur(10px); min-width: 200px;
  }
  #ui h2 { font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: #ffc850; margin-bottom: 4px; }
  #ui p { font-size: 11px; color: #888; margin-bottom: 14px; }
  .room-list { list-style: none; }
  .room-list li {
    font-size: 11px; padding: 5px 8px; border-radius: 6px;
    margin-bottom: 3px; cursor: pointer; transition: background 0.2s;
    display: flex; align-items: center; gap: 8px; color: #ccc;
  }
  .room-list li:hover { background: rgba(255,200,80,0.1); color: #fff; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  #controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 10px; z-index: 10;
  }
  .btn {
    background: rgba(15,17,23,0.85); border: 1px solid rgba(255,200,80,0.3);
    color: #ffc850; padding: 8px 18px; border-radius: 20px; font-size: 12px;
    cursor: pointer; backdrop-filter: blur(10px); transition: all 0.2s;
    letter-spacing: 1px;
  }
  .btn:hover { background: rgba(255,200,80,0.15); border-color: #ffc850; }
  .btn.active { background: rgba(255,200,80,0.2); border-color: #ffc850; }
  #tooltip {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: rgba(15,17,23,0.92); border: 1px solid rgba(255,200,80,0.4);
    border-radius: 10px; padding: 12px 20px; color: #fff;
    pointer-events: none; z-index: 20; display: none; text-align: center;
  }
  #tooltip h3 { color: #ffc850; font-size: 14px; margin-bottom: 4px; }
  #tooltip p { font-size: 12px; color: #aaa; }
  #hint {
    position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%);
    font-size: 11px; color: #555; letter-spacing: 1px; z-index: 10;
  }
  #minimap {
    position: fixed; bottom: 20px; right: 20px; z-index: 10;
    width: 130px; height: 110px;
    background: rgba(15,17,23,0.88);
    border: 1px solid rgba(255,200,80,0.25);
    border-radius: 10px; overflow: hidden;
    backdrop-filter: blur(8px);
  }
  #minimap canvas { width: 100%; height: 100%; }
  #minimap-label {
    position: absolute; top: 5px; left: 0; right: 0;
    text-align: center; font-size: 9px; color: #666;
    letter-spacing: 1px; text-transform: uppercase; pointer-events: none;
  }
  #measure-toggle {
    position: fixed; top: 20px; right: 20px; z-index: 10;
  }
  .room-label {
    position: fixed; pointer-events: none; z-index: 5;
    text-align: center; transform: translate(-50%, -50%);
  }
  .room-label span {
    display: block; font-size: 9px; color: rgba(255,255,255,0.7);
    background: rgba(0,0,0,0.35); padding: 2px 6px; border-radius: 4px;
    letter-spacing: 0.5px;
  }
  .room-label .dim {
    font-size: 8px; color: rgba(255,200,80,0.7);
    margin-top: 1px;
  }
  #sun-cycle {
    position: fixed; top: 20px; right: 20px; z-index: 10;
    background: rgba(15,17,23,0.85);
    border: 1px solid rgba(255,200,80,0.25);
    border-radius: 10px; padding: 10px 14px;
    backdrop-filter: blur(10px); color: #fff;
    min-width: 160px;
  }
  #sun-cycle h3 { font-size: 10px; color: #ffc850; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; }
  .slider-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .slider-row label { font-size: 10px; color: #888; width: 50px; }
  .slider-row input[type=range] { flex: 1; accent-color: #ffc850; height: 3px; }
  .slider-row span { font-size: 10px; color: #ccc; width: 28px; text-align: right; }
  #time-display { font-size: 18px; text-align: center; margin-bottom: 6px; }
  .toggle-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
  .toggle-row label { font-size: 10px; color: #888; flex: 1; }
  .toggle-row input[type=checkbox] { accent-color: #ffc850; }
</style>
</head>
<body>
<div id="canvas-container"></div>

<div id="ui">
  <h2>1 BHK Floor Plan</h2>
  <p>Click rooms to highlight</p>
  <ul class="room-list" id="room-list"></ul>
</div>

<div id="controls">
  <button class="btn active" onclick="setView('perspective')">3D View</button>
  <button class="btn" onclick="setView('top')">Top View</button>
  <button class="btn" onclick="setView('front')">Front View</button>
  <button class="btn" onclick="resetCamera()">Reset</button>
  <button class="btn" onclick="toggleRoof()">Toggle Roof</button>
</div>

<div id="hint">🖱 Drag to rotate · Scroll to zoom · Right-drag to pan · Pinch on mobile</div>

<div id="minimap">
  <canvas id="minimap-canvas"></canvas>
  <div id="minimap-label">Top View</div>
</div>

<div id="sun-cycle">
  <h3>☀ Lighting</h3>
  <div id="time-display">12:00</div>
  <div class="slider-row">
    <label>Time</label>
    <input type="range" id="time-slider" min="0" max="24" step="0.25" value="12" oninput="updateSunCycle(this.value)">
    <span id="time-val">12</span>
  </div>
  <div class="slider-row">
    <label>Intensity</label>
    <input type="range" id="intensity-slider" min="0" max="100" value="60" oninput="updateAmbient(this.value)">
    <span id="int-val">60</span>
  </div>
  <div class="toggle-row">
    <label>Room Lights</label>
    <input type="checkbox" id="room-lights-toggle" checked onchange="toggleRoomLights(this.checked)">
  </div>
  <div class="toggle-row">
    <label>Labels</label>
    <input type="checkbox" id="labels-toggle" checked onchange="toggleLabels(this.checked)">
  </div>
</div>

<div id="tooltip" id="tooltip">
  <h3 id="tt-name"></h3>
  <p id="tt-size"></p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── SCENE SETUP ───────────────────────────────────────────────────────────
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f1117);
scene.fog = new THREE.Fog(0x0f1117, 30, 80);

const W = container.clientWidth, H = container.clientHeight;
const camera = new THREE.PerspectiveCamera(45, W / H, 0.1, 200);
camera.position.set(14, 14, 18);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(W, H);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
container.appendChild(renderer.domElement);

// Lighting
const ambient = new THREE.AmbientLight(0xfff8e7, 0.6);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xfff0cc, 1.2);
sun.position.set(10, 20, 10);
sun.castShadow = true;
sun.shadow.mapSize.width = 2048;
sun.shadow.mapSize.height = 2048;
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far = 60;
sun.shadow.camera.left = -20;
sun.shadow.camera.right = 20;
sun.shadow.camera.top = 20;
sun.shadow.camera.bottom = -20;
scene.add(sun);

const fill = new THREE.PointLight(0x88aaff, 0.4, 40);
fill.position.set(-8, 8, -8);
scene.add(fill);

// ─── UNIT SCALE ────────────────────────────────────────────────────────────
// 1 foot = 0.3 units
const ft = 0.3;

// ─── MATERIALS ─────────────────────────────────────────────────────────────
const MAT = {
  floor:    new THREE.MeshStandardMaterial({ color: 0xd4c5a9, roughness: 0.8, metalness: 0.0 }),
  wall:     new THREE.MeshStandardMaterial({ color: 0xf5f0e8, roughness: 0.9, metalness: 0.0 }),
  balcony:  new THREE.MeshStandardMaterial({ color: 0xb8d4e8, roughness: 0.7, metalness: 0.1, transparent: true, opacity: 0.85 }),
  kitchen:  new THREE.MeshStandardMaterial({ color: 0xffe8c0, roughness: 0.8 }),
  bedroom:  new THREE.MeshStandardMaterial({ color: 0xd4e8d4, roughness: 0.8 }),
  bathroom: new THREE.MeshStandardMaterial({ color: 0xc8dce8, roughness: 0.7 }),
  living:   new THREE.MeshStandardMaterial({ color: 0xf0e0c8, roughness: 0.8 }),
  roof:     new THREE.MeshStandardMaterial({ color: 0xe8e0d0, roughness: 0.9, transparent: true, opacity: 0.3 }),
  glass:    new THREE.MeshStandardMaterial({ color: 0x88ccff, roughness: 0.1, metalness: 0.3, transparent: true, opacity: 0.35 }),
  door:     new THREE.MeshStandardMaterial({ color: 0x8b6f47, roughness: 0.7 }),
  railing:  new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.4, metalness: 0.6 }),
};

const HIGHLIGHT = new THREE.MeshStandardMaterial({ color: 0xffc850, roughness: 0.5, transparent: true, opacity: 0.6, emissive: 0xffa500, emissiveIntensity: 0.3 });

// Wall height
const WH = 9 * ft; // 9 feet wall height
const WT = 0.15;   // wall thickness

// ─── ROOM DEFINITIONS ──────────────────────────────────────────────────────
// All coords in feet, converted via ft multiplier
// Origin at SW corner of flat

/*  LAYOUT (from image + specs):
    Living Room: 9'0" × 14'0" — right side
    Bedroom:     9'0" × 10'0" — left side
    Kitchen:     6'0" × 10'0" — center-left
    WC:          5'0" × 3'0"  — center bottom
    Toilet:      4'0" × 6'0"  — center bottom
    Balcony-Living: 3'3" × 9'0" — right top
    Balcony-Bed:    3'3" × 9'0" — left top
    Dry Balcony:    3'3" × 6'0" — center top
*/

// Flat total: ~24' wide × ~17.25' deep (approx)
// X axis = width, Z axis = depth, Y = up

const BD = 3.25; // balcony depth (3'3")

// Room layout positions [x_start, z_start, width, depth] all in feet
const ROOMS = [
  {
    id: 'living', name: 'Living Room', size: "9'0\" × 14'0\"",
    x: 15, z: 3.25, w: 9, d: 14,
    floorMat: MAT.living, color: '#f0e0c8'
  },
  {
    id: 'bedroom', name: 'Master Bedroom', size: "9'0\" × 10'0\"",
    x: 0, z: 3.25, w: 9, d: 10,
    floorMat: MAT.bedroom, color: '#d4e8d4'
  },
  {
    id: 'kitchen', name: 'Kitchen', size: "6'0\" × 10'0\"",
    x: 9, z: 3.25, w: 6, d: 10,
    floorMat: MAT.kitchen, color: '#ffe8c0'
  },
  {
    id: 'wc', name: 'WC / Wash', size: "5'0\" × 3'0\"",
    x: 9, z: 0, w: 5, d: 3,
    floorMat: MAT.bathroom, color: '#c8dce8'
  },
  {
    id: 'toilet', name: 'Toilet', size: "4'0\" × 6'0\"",
    x: 11, z: 0, w: 4, d: 3.25,
    floorMat: MAT.bathroom, color: '#b8ccd8'
  },
  {
    id: 'bal_living', name: 'Living Balcony', size: "3'3\" × 9'0\"",
    x: 15, z: 0, w: 9, d: 3.25,
    floorMat: MAT.balcony, color: '#b8d4e8', isBalcony: true
  },
  {
    id: 'bal_bed', name: 'Bedroom Balcony', size: "3'3\" × 9'0\"",
    x: 0, z: 0, w: 9, d: 3.25,
    floorMat: MAT.balcony, color: '#b8d4e8', isBalcony: true
  },
  {
    id: 'bal_dry', name: 'Dry Balcony', size: "3'3\" × 6'0\"",
    x: 9, z: 0, w: 6, d: 3.25,
    floorMat: MAT.balcony, color: '#d0e8f0', isBalcony: true
  },
];

const roomMeshes = {};
const floorGroup = new THREE.Group();
scene.add(floorGroup);

// ─── BUILD FLOORS ──────────────────────────────────────────────────────────
ROOMS.forEach(room => {
  const geo = new THREE.BoxGeometry(room.w * ft, 0.08, room.d * ft);
  const mesh = new THREE.Mesh(geo, room.floorMat.clone());
  mesh.position.set(
    (room.x + room.w / 2) * ft,
    0,
    (room.z + room.d / 2) * ft
  );
  mesh.receiveShadow = true;
  mesh.userData = { room };
  floorGroup.add(mesh);
  roomMeshes[room.id] = { floor: mesh, walls: [], origMat: room.floorMat.clone() };
});

// ─── BUILD WALLS ───────────────────────────────────────────────────────────
function makeWall(x, z, w, h, d, mat) {
  const geo = new THREE.BoxGeometry(w, h, d);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, h / 2, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  return mesh;
}

const wallMat = MAT.wall;
const totalW = 24 * ft;
const totalD = 17.25 * ft;

// Outer walls
makeWall(totalW / 2, -WT / 2, totalW, WH, WT, wallMat); // Front
makeWall(totalW / 2, totalD + WT / 2, totalW, WH, WT, wallMat); // Back
makeWall(-WT / 2, totalD / 2, WT, WH, totalD, wallMat); // Left
makeWall(totalW + WT / 2, totalD / 2, WT, WH, totalD, wallMat); // Right

// Interior walls
// Bedroom/Kitchen divider (x=9)
makeWall(9 * ft, (3.25 + 10 / 2) * ft, WT, WH, 10 * ft, wallMat);
// Kitchen/Living divider (x=15)
makeWall(15 * ft, (3.25 + 13 / 2) * ft, WT, WH, 13 * ft, wallMat);
// WC/Bedroom divider floor (z=3.25 between x=9..15)
makeWall((9 + 6 / 2) * ft, 3.25 * ft, 6 * ft, WH, WT, wallMat);
// Living room / WC at z=3.25 (x=15..24)
makeWall((15 + 9 / 2) * ft, 3.25 * ft, 9 * ft, WH, WT, wallMat);

// Balcony wall (z = 0 already handled by outer wall)
// Balcony/room dividers at z=3.25 for bed+living already handled above
// Small WC divider
makeWall((9 + 5 / 2) * ft, 1.5 * ft, 5 * ft, WH, WT, wallMat); // WC top

// ─── BALCONY RAILINGS ──────────────────────────────────────────────────────
function addRailing(x1, z1, x2, z2, h) {
  const dx = (x2 - x1) * ft, dz = (z2 - z1) * ft;
  const len = Math.sqrt(dx * dx + dz * dz);
  const geo = new THREE.BoxGeometry(len, 0.06, 0.05);
  const mesh = new THREE.Mesh(geo, MAT.railing);
  mesh.position.set(((x1 + x2) / 2) * ft, h, ((z1 + z2) / 2) * ft);
  if (Math.abs(dz) > 0.01) mesh.rotation.y = Math.PI / 2;
  scene.add(mesh);

  // Vertical posts
  const posts = Math.ceil(len / (0.5 * ft));
  for (let i = 0; i <= posts; i++) {
    const t = i / posts;
    const pGeo = new THREE.CylinderGeometry(0.02, 0.02, h, 6);
    const pMesh = new THREE.Mesh(pGeo, MAT.railing);
    pMesh.position.set(
      (x1 + t * (x2 - x1)) * ft,
      h / 2,
      (z1 + t * (z2 - z1)) * ft
    );
    scene.add(pMesh);
  }
}

const RH = 3.5 * ft; // railing height
addRailing(0, 0, 9, 0, RH);      // Bedroom balcony front
addRailing(9, 0, 15, 0, RH);     // Dry balcony front
addRailing(15, 0, 24, 0, RH);    // Living balcony front

// ─── FURNITURE ─────────────────────────────────────────────────────────────
function box(x, z, w, d, h, yOff, color) {
  const geo = new THREE.BoxGeometry(w * ft, h * ft, d * ft);
  const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.7 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x * ft, yOff * ft + (h * ft) / 2, z * ft);
  mesh.castShadow = true;
  scene.add(mesh);
  return mesh;
}

// LIVING ROOM furniture (x: 15-24, z: 3.25-17.25)
box(16.5, 14.5, 6, 3, 2.5, 0.08, 0x8b7355);   // Sofa
box(18.5, 12.5, 2.5, 1.5, 1.5, 0.08, 0x6b5a3e); // Coffee table
box(22, 13, 1.5, 4, 3, 0.08, 0x4a3728);          // TV unit
box(23, 7, 0.5, 4, 4, 0.08, 0xc8d4dc);           // Window hint

// BEDROOM furniture (x: 0-9, z: 3.25-13.25)
box(3, 9.5, 5, 6.5, 2.5, 0.08, 0xffffff);       // Bed (white)
box(0.7, 8, 1.2, 1.2, 2, 0.08, 0x8b7355);       // Side table L
box(7.3, 8, 1.2, 1.2, 2, 0.08, 0x8b7355);       // Side table R
box(7, 12, 2, 1, 3, 0.08, 0x6b5a3e);            // Wardrobe

// KITCHEN (x: 9-15, z: 3.25-13.25)
box(9.3, 4.5, 0.6, 4, 2.8, 0.08, 0xe8e0d0);    // Counter L
box(11.5, 13, 4, 0.6, 2.8, 0.08, 0xe8e0d0);    // Counter back
box(12, 7.5, 1.2, 1.2, 2.5, 0.08, 0xa0a0a0);  // Fridge
// Slab top
box(9.3, 4.5, 0.6, 4, 0.1, 2.8, 0x888888);

// BALCONY plants hint
function plant(x, z) {
  const stem = new THREE.CylinderGeometry(0.06 * ft, 0.06 * ft, 0.5 * ft, 8);
  const pot = new THREE.CylinderGeometry(0.15 * ft, 0.1 * ft, 0.25 * ft, 8);
  const leaf = new THREE.SphereGeometry(0.25 * ft, 8, 8);
  const s = new THREE.Mesh(stem, new THREE.MeshStandardMaterial({ color: 0x556b2f }));
  const p = new THREE.Mesh(pot, new THREE.MeshStandardMaterial({ color: 0xc06030 }));
  const l = new THREE.Mesh(leaf, new THREE.MeshStandardMaterial({ color: 0x228b22 }));
  s.position.set(x * ft, 0.5 * ft, z * ft);
  p.position.set(x * ft, 0.2 * ft, z * ft);
  l.position.set(x * ft, 0.9 * ft, z * ft);
  scene.add(s); scene.add(p); scene.add(l);
}
plant(1, 1.5); plant(3, 1.5); plant(16, 1.5); plant(21, 1.5);

// ─── ROOF (toggleable) ─────────────────────────────────────────────────────
const roofGeo = new THREE.BoxGeometry(totalW + WT * 2, 0.12, totalD + WT * 2);
const roofMesh = new THREE.Mesh(roofGeo, MAT.roof);
roofMesh.position.set(totalW / 2, WH + 0.06, totalD / 2);
scene.add(roofMesh);

let roofVisible = false;
roofMesh.visible = false;

function toggleRoof() {
  roofVisible = !roofVisible;
  roofMesh.visible = roofVisible;
}

// ─── GRID ──────────────────────────────────────────────────────────────────
const grid = new THREE.GridHelper(40, 40, 0x222233, 0x1a1a2a);
grid.position.set(totalW / 2, -0.01, totalD / 2);
scene.add(grid);

// ─── ROOM LIST UI ──────────────────────────────────────────────────────────
const roomListEl = document.getElementById('room-list');
ROOMS.forEach(room => {
  const li = document.createElement('li');
  li.innerHTML = `<span class="dot" style="background:${room.color}"></span>${room.name}`;
  li.onclick = () => focusRoom(room.id);
  roomListEl.appendChild(li);
});

// ─── RAYCASTER FOR CLICK ───────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let highlighted = null;

renderer.domElement.addEventListener('click', e => {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const floors = Object.values(roomMeshes).map(r => r.floor);
  const hits = raycaster.intersectObjects(floors);
  if (hits.length > 0) {
    const mesh = hits[0].object;
    const room = mesh.userData.room;
    highlightRoom(room.id);
    showTooltip(room);
  }
});

function highlightRoom(id) {
  if (highlighted) {
    const prev = roomMeshes[highlighted];
    if (prev) prev.floor.material = prev.origMat;
  }
  highlighted = id;
  const rm = roomMeshes[id];
  if (rm) rm.floor.material = HIGHLIGHT;
  setTimeout(() => {
    if (rm) rm.floor.material = rm.origMat;
    highlighted = null;
    hideTooltip();
  }, 2500);
}

function showTooltip(room) {
  document.getElementById('tt-name').textContent = room.name;
  document.getElementById('tt-size').textContent = room.size;
  const tt = document.getElementById('tooltip');
  tt.style.display = 'block';
}

function hideTooltip() {
  document.getElementById('tooltip').style.display = 'none';
}

function focusRoom_OLD(id) {
  highlightRoom(id);
  const room = ROOMS.find(r => r.id === id);
  if (!room) return;
  const cx = (room.x + room.w / 2) * ft;
  const cz = (room.z + room.d / 2) * ft;
  camera.position.set(cx + 5, 8, cz + 8);
  controls.target.set(cx, 1, cz);
  showTooltip(room);
}

// ─── ORBIT CONTROLS (manual, no import) ────────────────────────────────────
const controls = {
  target: new THREE.Vector3(12 * ft, 0, 8 * ft),
  _isDown: false, _button: 0,
  _lastX: 0, _lastY: 0,
  _spherical: { theta: Math.PI / 4, phi: Math.PI / 4, r: 22 },
  _panOffset: new THREE.Vector3(),
};

function updateCamera() {
  const s = controls._spherical;
  camera.position.set(
    controls.target.x + s.r * Math.sin(s.phi) * Math.sin(s.theta),
    controls.target.y + s.r * Math.cos(s.phi),
    controls.target.z + s.r * Math.sin(s.phi) * Math.cos(s.theta)
  );
  camera.lookAt(controls.target);
}
updateCamera();

renderer.domElement.addEventListener('mousedown', e => {
  controls._isDown = true;
  controls._button = e.button;
  controls._lastX = e.clientX;
  controls._lastY = e.clientY;
});

window.addEventListener('mouseup', () => { controls._isDown = false; });

window.addEventListener('mousemove', e => {
  if (!controls._isDown) return;
  const dx = e.clientX - controls._lastX;
  const dy = e.clientY - controls._lastY;
  controls._lastX = e.clientX;
  controls._lastY = e.clientY;

  if (controls._button === 0) {
    controls._spherical.theta -= dx * 0.008;
    controls._spherical.phi = Math.max(0.1, Math.min(Math.PI / 2 - 0.05, controls._spherical.phi + dy * 0.008));
  } else if (controls._button === 2) {
    const s = controls._spherical;
    const right = new THREE.Vector3(Math.cos(s.theta), 0, -Math.sin(s.theta));
    const up = new THREE.Vector3(0, 1, 0);
    controls.target.addScaledVector(right, -dx * 0.02);
    controls.target.addScaledVector(up, dy * 0.02);
  }
  updateCamera();
});

renderer.domElement.addEventListener('wheel', e => {
  controls._spherical.r = Math.max(4, Math.min(40, controls._spherical.r + e.deltaY * 0.02));
  updateCamera();
});
renderer.domElement.addEventListener('contextmenu', e => e.preventDefault());

// setView and resetCamera are defined after smooth-camera setup below
const viewPresets = {
  perspective: { r: 22, theta: Math.PI / 4, phi: Math.PI / 4 },
  top:         { r: 22, theta: Math.PI / 4, phi: 0.05 },
  front:       { r: 22, theta: 0, phi: Math.PI / 2 - 0.1 },
};

function setView_OLD(name) {
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  const p = viewPresets[name];
  controls._spherical = { ...p };
  controls.target.set(12 * ft, 0, 8 * ft);
  updateCamera();
}

function resetCamera_OLD() {
  controls._spherical = { ...viewPresets.perspective };
  controls.target.set(12 * ft, 0, 8 * ft);
  updateCamera();
}

// ─── RENDER LOOP ───────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  animateCamera();
  updateLabels();
  drawMinimap();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── TOUCH SUPPORT ─────────────────────────────────────────────────────────
let touches = {};
let lastPinchDist = null;
let lastTouchX = 0, lastTouchY = 0;

renderer.domElement.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    lastPinchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
}, { passive: false });

renderer.domElement.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    const dx = e.touches[0].clientX - lastTouchX;
    const dy = e.touches[0].clientY - lastTouchY;
    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;
    controls._spherical.theta -= dx * 0.008;
    controls._spherical.phi = Math.max(0.1, Math.min(Math.PI / 2 - 0.05, controls._spherical.phi + dy * 0.008));
    updateCamera();
  } else if (e.touches.length === 2) {
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    if (lastPinchDist !== null) {
      const delta = lastPinchDist - dist;
      controls._spherical.r = Math.max(4, Math.min(40, controls._spherical.r + delta * 0.05));
      updateCamera();
    }
    lastPinchDist = dist;
  }
}, { passive: false });

renderer.domElement.addEventListener('touchend', e => {
  if (e.touches.length < 2) lastPinchDist = null;
});

// ─── SMOOTH CAMERA ANIMATION ───────────────────────────────────────────────
let camTarget = null;
function animateCamera() {
  if (!camTarget) return;
  const s = controls._spherical;
  const t = camTarget;
  const speed = 0.08;
  s.r     += (t.r     - s.r)     * speed;
  s.theta += (t.theta - s.theta) * speed;
  s.phi   += (t.phi   - s.phi)   * speed;
  controls.target.lerp(t.target, speed);
  updateCamera();
  if (Math.abs(s.r - t.r) < 0.01 && Math.abs(s.theta - t.theta) < 0.001) camTarget = null;
}

function animateTo(r, theta, phi, tx, ty, tz) {
  camTarget = { r, theta, phi, target: new THREE.Vector3(tx, ty, tz) };
}

// Override focusRoom with smooth animation
function focusRoom(id) {
  highlightRoom(id);
  const room = ROOMS.find(r => r.id === id);
  if (!room) return;
  const cx = (room.x + room.w / 2) * ft;
  const cz = (room.z + room.d / 2) * ft;
  animateTo(10, controls._spherical.theta, Math.PI / 5, cx, 1, cz);
  showTooltip(room);
}

// Override setView for smooth transitions
const _origSetView = setView;
function setView(name) {
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  const p = viewPresets[name];
  const tx = 12 * ft, ty = 0, tz = 8 * ft;
  animateTo(p.r, p.theta, p.phi, tx, ty, tz);
}

function resetCamera() {
  const p = viewPresets.perspective;
  animateTo(p.r, p.theta, p.phi, 12 * ft, 0, 8 * ft);
}

// ─── ROOM AMBIENT LIGHTS ───────────────────────────────────────────────────
const ROOM_LIGHT_COLORS = {
  living:     0xffe8cc,
  bedroom:    0xccf0cc,
  kitchen:    0xfff0cc,
  wc:         0xcceeff,
  toilet:     0xcceeff,
  bal_living: 0xddeeff,
  bal_bed:    0xddeeff,
  bal_dry:    0xddeeff,
};
const roomLights = {};
ROOMS.forEach(room => {
  const light = new THREE.PointLight(ROOM_LIGHT_COLORS[room.id] || 0xffffff, 0.5, 6);
  light.position.set(
    (room.x + room.w / 2) * ft,
    WH * 0.7,
    (room.z + room.d / 2) * ft
  );
  scene.add(light);
  roomLights[room.id] = light;
});

function toggleRoomLights(on) {
  Object.values(roomLights).forEach(l => l.visible = on);
}

// ─── SUN CYCLE ─────────────────────────────────────────────────────────────
function updateSunCycle(val) {
  val = parseFloat(val);
  // Convert hour to angle: 6am = east, 12 = overhead, 18 = west
  const hour = val;
  const angle = ((hour - 6) / 12) * Math.PI; // 0..PI for morning..evening
  const elevation = Math.sin(angle) * Math.PI / 2.5;

  const r = 25;
  sun.position.set(
    r * Math.cos(angle - Math.PI / 2),
    r * Math.max(0.05, Math.sin(elevation)),
    r * Math.sin(angle - Math.PI / 2)
  );

  // Sky and light color shifts with time
  const dawn  = new THREE.Color(0xff8844);
  const noon  = new THREE.Color(0xfff8e7);
  const dusk  = new THREE.Color(0xff6633);
  const night = new THREE.Color(0x1a1a3a);

  let skyCol, sunInt;
  if (hour < 6 || hour > 20) {
    skyCol = night; sunInt = 0.05;
  } else if (hour < 8) {
    const t = (hour - 6) / 2;
    skyCol = dawn.clone().lerp(noon, t); sunInt = 0.3 + t * 0.9;
  } else if (hour < 16) {
    skyCol = noon; sunInt = 1.2;
  } else if (hour < 20) {
    const t = (hour - 16) / 4;
    skyCol = noon.clone().lerp(dusk, t); sunInt = 1.2 - t * 1.1;
  } else {
    skyCol = night; sunInt = 0.05;
  }

  scene.background = skyCol.clone().multiplyScalar(hour >= 6 && hour <= 20 ? 0.07 : 0.02).add(new THREE.Color(0x0f1117));
  sun.color.set(skyCol);
  sun.intensity = Math.max(0.05, sunInt);
  fill.color.set(hour < 12 ? 0x88aaff : 0xffaa88);

  // Format time display
  const h = Math.floor(hour);
  const m = Math.round((hour - h) * 60);
  const ampm = h < 12 ? 'AM' : 'PM';
  const disp_h = h === 0 ? 12 : h > 12 ? h - 12 : h;
  const emoji = hour < 6 ? '🌙' : hour < 8 ? '🌅' : hour < 18 ? '☀️' : hour < 20 ? '🌇' : '🌙';
  document.getElementById('time-display').textContent = `${emoji} ${disp_h}:${m.toString().padStart(2,'0')} ${ampm}`;
  document.getElementById('time-val').textContent = disp_h + (m > 0 ? ':' + m.toString().padStart(2,'0') : '');
}
updateSunCycle(12);

function updateAmbient(val) {
  ambient.intensity = val / 100;
  document.getElementById('int-val').textContent = val;
}

// ─── FLOATING ROOM LABELS ──────────────────────────────────────────────────
const labelEls = {};
const labelContainer = document.createElement('div');
labelContainer.id = 'labels-container';
document.body.appendChild(labelContainer);

ROOMS.forEach(room => {
  const div = document.createElement('div');
  div.className = 'room-label';
  div.innerHTML = `<span>${room.name}</span><span class="dim">${room.size}</span>`;
  div.style.display = 'block';
  labelContainer.appendChild(div);
  labelEls[room.id] = { el: div, pos: new THREE.Vector3(
    (room.x + room.w / 2) * ft,
    WH * 0.5,
    (room.z + room.d / 2) * ft
  )};
});

function updateLabels() {
  const halfW = window.innerWidth / 2;
  const halfH = window.innerHeight / 2;
  Object.values(labelEls).forEach(({ el, pos }) => {
    const p = pos.clone().project(camera);
    // Only show if in front of camera
    if (p.z > 1) { el.style.display = 'none'; return; }
    el.style.display = 'block';
    el.style.left = (p.x * halfW + halfW) + 'px';
    el.style.top  = (-p.y * halfH + halfH) + 'px';
  });
}

function toggleLabels(on) {
  labelContainer.style.display = on ? 'block' : 'none';
}

// ─── MINIMAP ───────────────────────────────────────────────────────────────
const minimapCanvas = document.getElementById('minimap-canvas');
const mmCtx = minimapCanvas.getContext('2d');
minimapCanvas.width = 130;
minimapCanvas.height = 110;

const ROOM_COLORS_CSS = {
  living: '#f0e0c8', bedroom: '#d4e8d4', kitchen: '#ffe8c0',
  wc: '#c8dce8', toilet: '#b8ccd8',
  bal_living: '#b8d4e8', bal_bed: '#b8d4e8', bal_dry: '#d0e8f0'
};

function drawMinimap() {
  const mw = 130, mh = 110;
  const scaleX = (mw - 10) / (24); // 24 ft total width
  const scaleZ = (mh - 10) / (17.25);
  const ox = 5, oz = 5;

  mmCtx.clearRect(0, 0, mw, mh);
  mmCtx.fillStyle = 'rgba(15,17,23,0.0)';
  mmCtx.fillRect(0, 0, mw, mh);

  // Draw rooms
  ROOMS.forEach(room => {
    const col = highlighted === room.id ? '#ffc850' : (ROOM_COLORS_CSS[room.id] || '#ccc');
    mmCtx.fillStyle = col + 'cc';
    mmCtx.strokeStyle = 'rgba(255,200,80,0.3)';
    mmCtx.lineWidth = 0.5;
    mmCtx.fillRect(
      ox + room.x * scaleX,
      mh - oz - (room.z + room.d) * scaleZ,
      room.w * scaleX,
      room.d * scaleZ
    );
    mmCtx.strokeRect(
      ox + room.x * scaleX,
      mh - oz - (room.z + room.d) * scaleZ,
      room.w * scaleX,
      room.d * scaleZ
    );
  });

  // Camera direction indicator
  const camX = ox + (controls.target.x / ft / 24) * (mw - 10) + 5;
  const camZ = mh - oz - (controls.target.z / ft / 17.25) * (mh - 10);
  mmCtx.beginPath();
  mmCtx.arc(camX, camZ, 3, 0, Math.PI * 2);
  mmCtx.fillStyle = '#ffc850';
  mmCtx.fill();

  // Camera view cone
  const coneLen = 12;
  const theta = controls._spherical.theta + Math.PI;
  mmCtx.beginPath();
  mmCtx.moveTo(camX, camZ);
  mmCtx.lineTo(camX + Math.sin(theta - 0.4) * coneLen, camZ - Math.cos(theta - 0.4) * coneLen);
  mmCtx.lineTo(camX + Math.sin(theta + 0.4) * coneLen, camZ - Math.cos(theta + 0.4) * coneLen);
  mmCtx.closePath();
  mmCtx.fillStyle = 'rgba(255,200,80,0.15)';
  mmCtx.strokeStyle = 'rgba(255,200,80,0.5)';
  mmCtx.lineWidth = 0.7;
  mmCtx.fill();
  mmCtx.stroke();
}

// ─── DOOR OPENINGS ─────────────────────────────────────────────────────────
// Add door arcs as visual cues on the floor
function addDoorMarker(x, z, rot, color) {
  const shape = new THREE.Shape();
  shape.moveTo(0, 0);
  shape.absarc(0, 0, 0.8 * ft, 0, Math.PI / 2, false);
  shape.lineTo(0, 0);
  const geo = new THREE.ShapeGeometry(shape);
  const mat = new THREE.MeshStandardMaterial({ color: color || 0x8b6f47, roughness: 0.5, transparent: true, opacity: 0.4, side: THREE.DoubleSide });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.x = -Math.PI / 2;
  mesh.rotation.z = rot || 0;
  mesh.position.set(x * ft, 0.05, z * ft);
  scene.add(mesh);
  // Door slab
  const slabGeo = new THREE.BoxGeometry(0.8 * ft, 0.06, 0.04);
  const slabMat = new THREE.MeshStandardMaterial({ color: 0x8b6f47, roughness: 0.6 });
  const slab = new THREE.Mesh(slabGeo, slabMat);
  slab.position.set(x * ft + 0.4 * ft * Math.cos(rot || 0), WH / 2, z * ft + 0.4 * ft * Math.sin(rot || 0));
  scene.add(slab);
}

// Main door (front of building)
addDoorMarker(11.5, 0.2, 0, 0x6b5a3e);
// Bedroom door
addDoorMarker(9.2, 5, Math.PI / 2, 0x8b6f47);
// Kitchen door  
addDoorMarker(9.2, 8, Math.PI / 2, 0x8b6f47);
// Living room to balcony
addDoorMarker(18, 3.4, 0, 0x6699aa);
// Bedroom to balcony
addDoorMarker(4, 3.4, Math.PI, 0x6699aa);
// WC door
addDoorMarker(9.2, 1.5, Math.PI / 2, 0x6699aa);
